<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINAL EDGE - A/L Accounting</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f7fb;
  scroll-behavior:smooth;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:#1e3c72;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  z-index:1000;
  animation:slideDown 0.6s ease;
}

header img{
  width:40px;
  height:40px;
  border-radius:6px;
}

header a{
  color:white;
  text-decoration:none;
  margin-left:12px;
  font-weight:bold;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
  padding:80px 20px;
  animation:fadeIn 1s ease;
}

.hero h1{
  font-size:38px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 18px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

.green{background:#25D366;color:white;}
.white{background:white;color:#1e3c72;}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

/* CARDS */
.card{
  background:white;
  padding:20px;
  margin:10px;
  display:inline-block;
  width:180px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.08);
}

/* FOOTER */
footer{
  background:#1e3c72;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:20px;
}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes slideDown{
  from{transform:translateY(-40px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* MOBILE */
@media(max-width:768px){
  .hero h1{font-size:26px;}
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
  <div>
    <img src="logo.png" alt="logo">
    <b>FINAL EDGE</b>
  </div>

  <div>
    <a href="#home">Home</a>
    <a href="#lessons">Lessons</a>
    <a href="#videos">Videos</a>
  </div>
</header>

<!-- HERO -->
<div class="hero" id="home">
  <h1>A/L Accounting 2026 - 2027</h1>
  <p>Learn Smart | Score High | Tamil Medium</p>

  <a class="btn green" href="https://chat.whatsapp.com/IeXijrdITNM3JcZtlKkaeb">Join Group</a>
  <a class="btn white" href="https://wa.me/94767273183">Chat</a>
</div>

<!-- LESSONS -->
<div class="section">
  <h2>Lessons</h2>
  <div class="card">Unit 1</div>
  <div class="card">Unit 2</div>
  <div class="card">Unit 3</div>
  <div class="card">Past Papers</div>
</div>

<!-- VIDEO -->
<div class="section">
  <h2>Video Lesson</h2>

  <iframe width="320" height="200"
  src="https://www.youtube.com/embed/-hBRX9DbyNg"
  frameborder="0" allowfullscreen></iframe>
</div>

<!-- FOOTER -->
<footer>
  © 2026 FINAL EDGE | A/L Accounting
</footer>

<script>
// Scroll animation
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add('show');
    }
  });
});
</script>

</body>
</html>
