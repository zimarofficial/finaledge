<style>

  background:#f4f7fb;

/* HEADER */
header{
  background:#1e3c72;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header img{

/* FOOTER */

  color:white;
  text-align:center;
  padding:15px;
  margin-top:20px;
}

/* MOBILE */
